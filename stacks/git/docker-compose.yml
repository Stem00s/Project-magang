services:
  gitea:
    container_name: gitea
    image: gitea/gitea:latest
    env_file:
      - .env
    environment:
      - DB_TYPE=${DB_TYPE}
      - DB_HOST=${DB_HOST}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWD=${DB_PASSWD}
      - GITEA__server__HTTP_PORT=${GITEA_HTTP_PORT}
    restart: always
    networks:
      - gitea-internal
    volumes:
      - git_data:/data
    ports:
      - "${GITEA_HTTP_PORT}:3000"
      - "${GITEA_SSH_PORT}:22"
    depends_on:
      - db

  db:
    container_name: gitea-db
    image: mysql:latest
    env_file:
      - .env
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
    restart: always
    networks:
      - gitea-internal
    volumes:
      - db_data:/var/lib/mysql
    expose:
      - 3306

networks:
  gitea-internal:
    driver: bridge

volumes:
  db_data:
  git_data: