services:
  gitea:
    container_name: gitea
    image: gitea/gitea:latest
    environment:
      - DB_TYPE=mysql
      - DB_HOST=gitea-db:3306
      - DB_NAME=gitea
      - DB_USER=gitea
      - DB_PASSWD=gitea
      - GITEA__server__DOMAIN=git.local
      - GITEA__server__ROOT_URL=http://git.local/
      - GITEA__server__HTTP_PORT=3000
    restart: always
    networks:
      - gitea-internal
      - traefik-proxy
    volumes:
      - git_data:/data
    ports:
      - "3000:3000"
      - "2222:22"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.gitea.rule=Host(`git.local`)"
      - "traefik.http.routers.gitea.entrypoints=web"
      - "traefik.http.services.gitea.loadbalancer.server.port=3000"
      - "traefik.docker.network=traefik-proxy"
    depends_on:
      - db

  db:
    container_name: gitea-db
    image: mysql:latest
    environment:
      - MYSQL_ROOT_PASSWORD=gitea
      - MYSQL_DATABASE=gitea
      - MYSQL_USER=gitea
      - MYSQL_PASSWORD=gitea
    restart: always
    networks:
      - gitea-internal
    volumes:
      - db_data:/var/lib/mysql
    expose:
      - 3306

networks:
  gitea-internal:
    name: gitea-internal
    driver: bridge
    
  traefik-proxy:
    external: true

volumes:
  db_data:
  git_data: