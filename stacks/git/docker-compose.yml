services:
  gitea:
    container_name: gitea
    image: gitea/gitea:latest
    env_file:
      - .env
    restart: always
    networks:
      - gitea-internal
    volumes:
      - ./logs:/logs
      - ./logs/gitea-data:/data
    ports:
      - "${GITEA_HTTP_PORT}:3000"
      - "${GITEA_SSH_PORT}:22"
    depends_on:
      - db

  db:
    container_name: gitea-db
    image: mysql:latest
    env_file:
      - .env
    restart: always
    networks:
      - gitea-internal
    volumes:
      - ./logs:/logs
      - ./logs/db-data:/var/lib/mysql
    expose:
      - 3306

networks:
  gitea-internal:
    driver: bridge
